<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proyecto AR - SENA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .arjs-loader div {
      text-align: center;
      font-size: 1.25em;
      color: white;
    }

    .scan-guide {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      max-width: 320px;
      height: 60vw;
      max-height: 320px;
      z-index: 9998;
      pointer-events: none;
      display: none;
    }
    .scan-guide .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 4px solid #00ff90;
    }
    .scan-guide .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
    .scan-guide .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
    .scan-guide .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
    .scan-guide .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }

    .scan-hint {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      pointer-events: none;
      display: none;
    }

    /* Overlay que aparece cuando se detecta el QR */
    .qr-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      z-index: 9997;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .qr-overlay.visible {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .qr-overlay img {
      max-width: 60vw;
      max-height: 60vw;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <div class="arjs-loader">
    <div>Cargando, por favor espera...</div>
  </div>

  <div class="scan-guide" id="scan-guide">
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>
  </div>
  <div class="scan-hint" id="scan-hint">Centra la imagen dentro del marco</div>

  <div class="qr-overlay" id="qr-overlay">
    <img src="Activos/overlay1.png" alt="QR detectado">
  </div>

  <canvas id="qr-canvas" style="display:none;"></canvas>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >

    <a-assets>
      <img id="overlay2" src="Activos/overlay2.png">
      <video id="video1" src="Activos/video.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-nft
      type="nft"
      url="Marcadores/Logotipo/logo"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      id="marker-logo"
    >
      <a-image
        src="#overlay2"
        position="0 0 0"
        rotation="-90 0 0"
        width="1"
        height="1"
      ></a-image>
    </a-nft>

    <a-nft
      type="nft"
      url="Marcadores/Letras/letras"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      id="marker-letras"
    >
      <a-video
        src="#video1"
        position="0 0 0"
        rotation="-90 0 0"
        width="1"
        height="0.5625"
      ></a-video>
    </a-nft>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const markerLetras = document.querySelector('#marker-letras');
    const video = document.querySelector('#video1');
    const scanGuide = document.querySelector('#scan-guide');
    const scanHint = document.querySelector('#scan-hint');
    const allNfts = document.querySelectorAll('a-nft');
    const qrOverlay = document.querySelector('#qr-overlay');

    // Video: solo se reproduce cuando se detecta el marcador de las letras
    markerLetras.addEventListener('markerFound', () => {
      video.currentTime = 0;
      video.play();
    });
    markerLetras.addEventListener('markerLost', () => {
      video.pause();
    });

    // Marco guia: desaparece cuando se detecta cualquier marcador NFT
    allNfts.forEach((nft) => {
      nft.addEventListener('markerFound', () => {
        scanGuide.style.display = 'none';
        scanHint.style.display = 'none';
      });
      nft.addEventListener('markerLost', () => {
        scanGuide.style.display = 'block';
        scanHint.style.display = 'block';
      });
    });

    // Oculta el loader y muestra el marco solo cuando la camara ya esta activa
    document.querySelector('a-scene').addEventListener('loaded', () => {
      document.querySelector('.arjs-loader').style.display = 'none';
      setTimeout(() => {
        scanGuide.style.display = 'block';
        scanHint.style.display = 'block';
        iniciarLecturaQR();
      }, 2000);
    });

    // ---------- LECTURA DE QR (independiente del sistema NFT) ----------
    function iniciarLecturaQR() {
      const canvasElement = document.querySelector('#qr-canvas');
      const canvas = canvasElement.getContext('2d', { willReadFrequently: true });

      const videos = document.querySelectorAll("video");
      let arVideo = null;
      
      videos.forEach(v => {
        if (v.id !== "video1") {
          arVideo = v;
        }
      });
      
      // CORRECCIÓN: Se cerró correctamente la llave de validación que faltaba aquí
      if (!arVideo) {
        console.warn("No se encontró el video de la cámara. Reintentando...");
        setTimeout(iniciarLecturaQR, 1000);
        return;
      }

      let qrVisible = false;
      let ultimaDeteccion = 0;

      function tick() {
        if (arVideo.readyState === arVideo.HAVE_ENOUGH_DATA) {
          canvasElement.height = arVideo.videoHeight;
          canvasElement.width = arVideo.videoWidth;
          canvas.drawImage(arVideo, 0, 0, canvasElement.width, canvasElement.height);
          const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);

          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            versionAttempts: 'dontInvert',
          });

          const ahora = Date.now();

          if (code) {
            ultimaDeteccion = ahora;
            if (!qrVisible) {
              qrVisible = true;
              qrOverlay.classList.add('visible');
              scanGuide.style.display = 'none';
              scanHint.style.display = 'none';
              console.log('QR detectado, contenido:', code.data);
            }
          } else if (qrVisible && (ahora - ultimaDeteccion) > 500) {
            qrVisible = false;
            qrOverlay.classList.remove('visible');
            scanGuide.style.display = 'block';
            scanHint.style.display = 'block';
          }
        }
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }
  </script>

</body>
</html>
