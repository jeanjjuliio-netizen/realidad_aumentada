<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proyecto AR - SENA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    .arjs-loader {
      height: 100%; width: 100%; position: absolute; top: 0; left: 0;
      background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      font-family: sans-serif; color: white; font-size: 1.25em;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <div class="arjs-loader" id="loader">
    <div>Iniciando Cámara, por favor espera...</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >

    <a-assets>
      <img id="asset-silla" src="Activos/silla.png">
      <img id="asset-balon" src="Activos/balon.png">
      <video id="asset-video" src="Activos/video.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-marker type="pattern" url="Marcadores/qr.patt" id="marker-qr">
      <a-image
        src="#asset-silla"
        position="0 0 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5"
      ></a-image>
    </a-marker>

    <a-marker type="pattern" url="Marcadores/logo.patt" id="marker-logo">
      <a-image
        src="#asset-balon"
        position="0 0 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5"
      ></a-image>
    </a-marker>

    <a-marker type="pattern" url="Marcadores/arsena.patt" id="marker-video">
      <a-video
        src="#asset-video"
        position="0 0 0"
        rotation="-90 0 0"
        width="1.77"
        height="1"
      ></a-video>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const markerVideo = document.querySelector('#marker-video');
    const video = document.querySelector('#asset-video');
    const loader = document.querySelector('#loader');

    // Ocultar el aviso de carga al iniciar
    document.querySelector('a-scene').addEventListener('loaded', () => {
      loader.style.display = 'none';
    });

    // Control del video animado
    markerVideo.addEventListener('markerFound', () => {
      video.currentTime = 0;
      video.play().catch(err => console.log("La reproducción automática requiere interacción previa:", err));
    });

    markerVideo.addEventListener('markerLost', () => {
      video.pause();
    });
  </script>

</body>
</html>
